<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrammaLang v0.3 — Анализ воли</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: #e94560; margin-bottom: 20px; }
        textarea { width: 100%; height: 200px; background: #16213e; color: #eee; border: 2px solid #0f3460; border-radius: 10px; padding: 15px; font-size: 14px; resize: vertical; }
        button { display: block; width: 100%; padding: 15px; background: #e94560; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin: 15px 0; transition: 0.3s; }
        button:hover { background: #c23152; }
        .result { display: none; background: #16213e; border-radius: 10px; padding: 20px; margin-top: 20px; }
        .summary { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .card { flex: 1; min-width: 150px; background: #0f3460; border-radius: 10px; padding: 15px; text-align: center; }
        .card .value { font-size: 32px; font-weight: bold; color: #e94560; }
        .card .label { font-size: 14px; color: #aaa; }
        .graphs { display: flex; gap: 20px; flex-wrap: wrap; }
        .graph-box { flex: 1; min-width: 400px; background: #0f3460; border-radius: 10px; padding: 15px; }
        .graph-box h3 { text-align: center; margin-bottom: 10px; }
        .graph-box svg { width: 100%; height: 300px; background: #16213e; border-radius: 8px; }
        .link { stroke: #aaa; stroke-opacity: 0.6; stroke-width: 2px; }
        .sentence-list { max-height: 300px; overflow-y: auto; margin-top: 15px; }
        .sentence-item { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #0f3460; }
        .badge { padding: 4px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; color: white; margin-right: 10px; min-width: 90px; text-align: center; }
        .badge-parmenides { background: #e94560; }
        .badge-heraclitus { background: #2196F3; }
        .badge-neutral { background: #666; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔮 GrammaLang v0.3</h1>
    <textarea id="textInput" placeholder="Введите философский текст на русском языке...">Бытие есть, и оно всегда неизменно. Всё течёт, всё изменяется, но борьба остаётся.</textarea>
    <button onclick="analyze()">Анализировать волю</button>
    <div id="loading" style="text-align:center;display:none;">⏳ Анализ... подождите 10-30 секунд...</div>
    <div id="result" class="result">
        <div class="summary" id="summary"></div>
        <div class="graphs">
            <div class="graph-box"><h3>Парменид (иерархия)</h3><div id="parmenidesGraph"></div></div>
            <div class="graph-box"><h3>Гераклит (сеть)</h3><div id="heraclitusGraph"></div></div>
        </div>
        <h3>Предложения</h3>
        <div class="sentence-list" id="sentences"></div>
    </div>
</div>

<script>
async function analyze() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    
    const text = document.getElementById('textInput').value;
    const response = await fetch('/analyze', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text: text})
    });
    const data = await response.json();
    
    document.getElementById('loading').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    
    // Сводка
    document.getElementById('summary').innerHTML = `
        <div class="card"><div class="value">${data.summary.mean.toFixed(2)}</div><div class="label">Индекс воли</div></div>
        <div class="card"><div class="value">${(data.summary.parmenides_share*100).toFixed(0)}%</div><div class="label">Парменид</div></div>
        <div class="card"><div class="value">${(data.summary.heraclitus_share*100).toFixed(0)}%</div><div class="label">Гераклит</div></div>
        <div class="card"><div class="value">${data.ontology_type}</div><div class="label">Тип онтологии</div></div>
    `;
    
    // Графы
    drawGraph(data.parmenides_graph, '#parmenidesGraph', '#e94560');
    drawGraph(data.heraclitus_graph, '#heraclitusGraph', '#2196F3');
    
    // Предложения
    let sentHTML = '';
    data.sentences.forEach((s, i) => {
        const idx = data.indices[i] || 0;
        let badge = 'badge-neutral', label = 'Нейтрально';
        if (idx > 0.3) { badge = 'badge-parmenides'; label = 'Парменид'; }
        else if (idx < -0.3) { badge = 'badge-heraclitus'; label = 'Гераклит'; }
        sentHTML += `<div class="sentence-item"><span class="badge ${badge}">${label}</span><span>${s}</span></div>`;
    });
    document.getElementById('sentences').innerHTML = sentHTML;
}

function drawGraph(graphData, selector, color) {
    const container = document.querySelector(selector);
    container.innerHTML = '';
    const width = container.clientWidth || 400;
    const height = 300;
    
    if (!graphData.nodes || graphData.nodes.length === 0) {
        container.innerHTML = '<p style="color:#aaa;text-align:center;padding:50px;">Нет данных</p>';
        return;
    }
    
    const svg = d3.select(selector).append('svg').attr('width', width).attr('height', height);
    
    const simulation = d3.forceSimulation(graphData.nodes)
        .force('link', d3.forceLink(graphData.links).id(d => d.id).distance(100))
        .force('charge', d3.forceManyBody().strength(-300))
        .force('center', d3.forceCenter(width/2, height/2));
    
    const link = svg.append('g').selectAll('line').data(graphData.links)
        .enter().append('line').attr('stroke', '#aaa').attr('stroke-opacity', 0.6).attr('stroke-width', 2);
    
    const node = svg.append('g').selectAll('g').data(graphData.nodes)
        .enter().append('g');
    
    node.append('circle').attr('r', d => d.type === 'substance' ? 12 : 8)
        .attr('fill', d => d.type === 'substance' ? color : '#aaa')
        .attr('stroke', '#fff').attr('stroke-width', 2);
    
    node.append('text').text(d => d.id).attr('x', 15).attr('y', 4)
        .attr('fill', '#fff').attr('font-size', '10px');
    
    simulation.on('tick', () => {
        link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        node.attr('transform', d => `translate(${d.x},${d.y})`);
    });
}
</script>
</body>
</html>
