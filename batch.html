<!-- batch.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrammaLang — Пакетный анализ глав</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        
        .header { background: #16213e; padding: 20px 40px; border-bottom: 2px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: #e94560; font-size: 22px; }
        .header .status { font-size: 14px; color: #888; }
        .header .status.online { color: #2ecc71; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 30px; }
        
        .upload-section { background: #16213e; border-radius: 12px; padding: 30px; margin-bottom: 30px; border: 1px solid #0f3460; }
        .upload-section h2 { color: #e94560; margin-bottom: 20px; }
        
        .upload-methods { display: flex; gap: 20px; margin-bottom: 20px; }
        .upload-method { flex: 1; background: #1a1a2e; border: 2px dashed #0f3460; border-radius: 10px; padding: 30px; text-align: center; cursor: pointer; transition: 0.3s; }
        .upload-method:hover { border-color: #e94560; background: #1a1a2e; }
        .upload-method .icon { font-size: 40px; margin-bottom: 10px; }
        .upload-method .title { font-size: 16px; font-weight: 600; color: #fff; }
        .upload-method .desc { font-size: 12px; color: #888; margin-top: 5px; }
        
        input[type="file"] { display: none; }
        
        .progress-section { display: none; margin-bottom: 30px; }
        .progress-section.active { display: block; }
        .progress-bar { height: 8px; background: #0f3460; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #e94560, #3498db); border-radius: 4px; transition: width 0.3s; width: 0%; }
        .progress-text { font-size: 14px; color: #888; }
        
        .results-section { display: none; }
        .results-section.active { display: block; }
        
        .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .summary-card { background: #16213e; border: 1px solid #0f3460; border-radius: 10px; padding: 20px; text-align: center; }
        .summary-card .num { font-size: 32px; font-weight: 700; color: #e94560; }
        .summary-card .label { font-size: 12px; color: #888; margin-top: 5px; text-transform: uppercase; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; background: #16213e; border: 1px solid #0f3460; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 14px; color: #888; transition: 0.2s; }
        .tab.active { background: #e94560; color: #fff; border-color: #e94560; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; background: #16213e; border-radius: 10px; overflow: hidden; }
        th { background: #0f3460; padding: 12px 15px; text-align: left; font-size: 13px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 10px 15px; border-bottom: 1px solid #0f3460; font-size: 14px; }
        tr:hover td { background: #1a2a4e; }
        
        .style-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .style-split { background: #44CC4430; color: #44CC44; }
        .style-hold { background: #FF880030; color: #FF8800; }
        .style-transition { background: #AA44FF30; color: #AA44FF; }
        .style-grammar_change { background: #00BBBB30; color: #00BBBB; }
        
        .chart-container { background: #16213e; border-radius: 10px; padding: 20px; margin-bottom: 20px; border: 1px solid #0f3460; }
        .chart-title { font-size: 16px; color: #e94560; margin-bottom: 15px; }
        
        .bar-chart { display: flex; flex-direction: column; gap: 8px; }
        .bar-row { display: flex; align-items: center; gap: 10px; }
        .bar-label { width: 150px; font-size: 13px; text-align: right; color: #aaa; flex-shrink: 0; }
        .bar-track { flex: 1; height: 24px; background: #0f3460; border-radius: 4px; overflow: hidden; position: relative; }
        .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
        .bar-value { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 12px; font-weight: 600; color: #fff; }
        
        .btn { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.2s; }
        .btn-export { background: #e94560; color: #fff; margin-right: 10px; }
        .btn-export:hover { background: #c23152; }
        .btn-clear { background: #0f3460; color: #fff; }
        .btn-clear:hover { background: #1a4a7a; }
    </style>
</head>
<body>
    <div class="header">
        <h1>GrammaLang — Пакетный анализ</h1>
        <span class="status" id="serverStatus">⏳ Проверка сервера...</span>
    </div>
    
    <div class="container">
        <!-- Загрузка -->
        <div class="upload-section">
            <h2>📂 Загрузите главы для анализа (до 100 файлов)</h2>
            <div class="upload-methods">
                <div class="upload-method" onclick="document.getElementById('zipInput').click()">
                    <div class="icon">📦</div>
                    <div class="title">ZIP-архив</div>
                    <div class="desc">Загрузите архив с .txt файлами</div>
                    <input type="file" id="zipInput" accept=".zip" onchange="uploadZip(this)">
                </div>
                <div class="upload-method" onclick="document.getElementById('filesInput').click()">
                    <div class="icon">📄</div>
                    <div class="title">Файлы .txt</div>
                    <div class="desc">Выберите до 100 файлов</div>
                    <input type="file" id="filesInput" accept=".txt" multiple onchange="uploadFiles(this)">
                </div>
                <div class="upload-method" onclick="document.getElementById('folderInput').click()">
                    <div class="icon">📁</div>
                    <div class="title">Папка</div>
                    <div class="desc">Выберите папку с .txt файлами</div>
                    <input type="file" id="folderInput" webkitdirectory directory multiple onchange="uploadFiles(this)">
                </div>
            </div>
        </div>
        
        <!-- Прогресс -->
        <div class="progress-section" id="progressSection">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">Подготовка...</div>
        </div>
        
        <!-- Результаты -->
        <div class="results-section" id="resultsSection">
            <!-- Сводка -->
            <div class="summary" id="summary"></div>
            
            <!-- Вкладки -->
            <div class="tabs">
                <div class="tab active" onclick="switchTab('table')">📊 Таблица глав</div>
                <div class="tab" onclick="switchTab('operators')">⚙️ Операторы</div>
                <div class="tab" onclick="switchTab('substances')">🧬 Топ субстанций</div>
                <div class="tab" onclick="switchTab('tensions')">⚡ Топ противоречий</div>
            </div>
            
            <div class="tab-content active" id="tab-table"></div>
            <div class="tab-content" id="tab-operators"></div>
            <div class="tab-content" id="tab-substances"></div>
            <div class="tab-content" id="tab-tensions"></div>
            
            <!-- Кнопки -->
            <div style="margin-top:20px;">
                <button class="btn btn-export" onclick="exportCSV()">📥 Экспорт CSV</button>
                <button class="btn btn-export" onclick="exportJSON()">📥 Экспорт JSON</button>
                <button class="btn btn-clear" onclick="clearResults()">✕ Очистить</button>
            </div>
        </div>
    </div>
    
    <script>
        const SERVER = 'http://localhost:8080';
        let batchData = null;
        
        // Проверка сервера
        async function checkServer() {
            const el = document.getElementById('serverStatus');
            try {
                const r = await fetch(SERVER + '/health');
                if (r.ok) {
                    el.textContent = '🟢 Сервер онлайн';
                    el.className = 'status online';
                } else {
                    el.textContent = '🔴 Сервер недоступен';
                }
            } catch(e) {
                el.textContent = '🔴 Сервер недоступен';
            }
        }
        checkServer();
        
        // Загрузка ZIP
        async function uploadZip(input) {
            const file = input.files[0];
            if (!file) return;
            
            showProgress('Загрузка ZIP-архива...');
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const r = await fetch(SERVER + '/batch-analyze', {
                    method: 'POST',
                    body: formData,
                });
                const data = await r.json();
                showResults(data);
            } catch(e) {
                alert('Ошибка: ' + e.message);
                hideProgress();
            }
        }
        
        // Загрузка файлов
        async function uploadFiles(input) {
            const files = Array.from(input.files).filter(f => f.name.endsWith('.txt'));
            if (!files.length) { alert('Нет .txt файлов'); return; }
            if (files.length > 100) { alert('Максимум 100 файлов'); return; }
            
            showProgress(`Чтение ${files.length} файлов...`);
            
            const texts = [];
            for (const file of files) {
                const content = await readFile(file);
                texts.push({ filename: file.name, content });
            }
            
            updateProgress(30, 'Отправка на анализ...');
            
            try {
                const r = await fetch(SERVER + '/batch-analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texts }),
                });
                updateProgress(80, 'Анализ...');
                const data = await r.json();
                updateProgress(100, 'Готово!');
                setTimeout(() => showResults(data), 300);
            } catch(e) {
                alert('Ошибка: ' + e.message);
                hideProgress();
            }
        }
        
        function readFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsText(file);
            });
        }
        
        // Прогресс
        function showProgress(text) {
            document.getElementById('progressSection').classList.add('active');
            document.getElementById('resultsSection').classList.remove('active');
            document.getElementById('progressText').textContent = text;
            document.getElementById('progressFill').style.width = '10%';
        }
        
        function updateProgress(pct, text) {
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = text;
        }
        
        function hideProgress() {
            document.getElementById('progressSection').classList.remove('active');
        }
        
        // Отображение результатов
        function showResults(data) {
            batchData = data;
            hideProgress();
            document.getElementById('resultsSection').classList.add('active');
            
            // Сводка
            document.getElementById('summary').innerHTML = `
                <div class="summary-card"><div class="num">${data.success_count}/${data.total_chapters}</div><div class="label">Глав проанализировано</div></div>
                <div class="summary-card"><div class="num">${data.total_substances}</div><div class="label">Субстанций всего</div></div>
                <div class="summary-card"><div class="num">${data.total_tensions}</div><div class="label">Противоречий всего</div></div>
                <div class="summary-card"><div class="num">${data.total_time.toFixed(1)}с</div><div class="label">Время анализа</div></div>
                <div class="summary-card"><div class="num">${data.total_split}</div><div class="label">Split</div></div>
                <div class="summary-card"><div class="num">${data.total_hold}</div><div class="label">Hold</div></div>
                <div class="summary-card"><div class="num">${data.total_transition}</div><div class="label">Transition</div></div>
                <div class="summary-card"><div class="num">${data.total_grammar_change}</div><div class="label">Grammar Ch.</div></div>
            `;
            
            // Таблица
            renderTable(data);
            renderOperatorsChart(data);
            renderSubstancesChart(data);
            renderTensionsChart(data);
        }
        
        function renderTable(data) {
            const styleClass = (s) => {
                if (s.includes('Структурный')) return 'style-split';
                if (s.includes('Диалектический')) return 'style-hold';
                if (s.includes('Переходный')) return 'style-transition';
                if (s.includes('Рефлексивный')) return 'style-grammar_change';
                return '';
            };
            
            document.getElementById('tab-table').innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Файл</th><th>Слов</th><th>Субстанций</th>
                            <th>Split</th><th>Hold</th><th>Transition</th><th>Grammar Ch.</th>
                            <th>Стиль</th><th>Время</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.chapters.map(ch => `
                            <tr>
                                <td title="${ch.title}">${ch.filename}</td>
                                <td>${ch.word_count}</td>
                                <td>${ch.substances.length}</td>
                                <td>${ch.split_count}</td>
                                <td>${ch.hold_count}</td>
                                <td>${ch.transition_count}</td>
                                <td>${ch.grammar_change_count}</td>
                                <td><span class="style-badge ${styleClass(ch.dominant_style)}">${ch.dominant_style}</span></td>
                                <td>${ch.analysis_time.toFixed(1)}с</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        function renderOperatorsChart(data) {
            const max = Math.max(data.total_split, data.total_hold, data.total_transition, data.total_grammar_change, 1);
            document.getElementById('tab-operators').innerHTML = `
                <div class="chart-container">
                    <div class="chart-title">⚙️ Распределение операторов по всем главам</div>
                    <div class="bar-chart">
                        ${[
                            {label:'Split', value:data.total_split, color:'#44CC44'},
                            {label:'Hold', value:data.total_hold, color:'#FF8800'},
                            {label:'Transition', value:data.total_transition, color:'#AA44FF'},
                            {label:'Grammar Change', value:data.total_grammar_change, color:'#00BBBB'},
                        ].map(op => `
                            <div class="bar-row">
                                <div class="bar-label">${op.label}</div>
                                <div class="bar-track">
                                    <div class="bar-fill" style="width:${(op.value/max*100).toFixed(1)}%;background:${op.color}"></div>
                                    <div class="bar-value">${op.value}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        function renderSubstancesChart(data) {
            const max = data.top_substances[0]?.total_count || 1;
            document.getElementById('tab-substances').innerHTML = `
                <div class="chart-container">
                    <div class="chart-title">🧬 Топ-10 субстанций</div>
                    <div class="bar-chart">
                        ${data.top_substances.map(s => `
                            <div class="bar-row">
                                <div class="bar-label">${s.name}</div>
                                <div class="bar-track">
                                    <div class="bar-fill" style="width:${(s.total_count/max*100).toFixed(1)}%;background:linear-gradient(90deg,#e94560,#3498db)"></div>
                                    <div class="bar-value">${s.total_count}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        function renderTensionsChart(data) {
            const max = data.top_tensions[0]?.chapter_count || 1;
            document.getElementById('tab-tensions').innerHTML = `
                <div class="chart-container">
                    <div class="chart-title">⚡ Топ-10 противоречий (по числу глав)</div>
                    <div class="bar-chart">
                        ${data.top_tensions.map(t => `
                            <div class="bar-row">
                                <div class="bar-label">${t.pole_a} ↔ ${t.pole_b}</div>
                                <div class="bar-track">
                                    <div class="bar-fill" style="width:${(t.chapter_count/max*100).toFixed(1)}%;background:#FF8800"></div>
                                    <div class="bar-value">${t.chapter_count} глав</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        function switchTab(name) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + name).classList.add('active');
        }
        
        function exportCSV() {
            if (!batchData) return;
            let csv = 'Файл,Слов,Субстанций,Split,Hold,Transition,GrammarCh,Стиль,Время\n';
            batchData.chapters.forEach(ch => {
                csv += `"${ch.filename}",${ch.word_count},${ch.substances.length},${ch.split_count},${ch.hold_count},${ch.transition_count},${ch.grammar_change_count},"${ch.dominant_style}",${ch.analysis_time.toFixed(2)}\n`;
            });
            downloadFile('batch_analysis.csv', csv, 'text/csv');
        }
        
        function exportJSON() {
            if (!batchData) return;
            downloadFile('batch_analysis.json', JSON.stringify(batchData, null, 2), 'application/json');
        }
        
        function downloadFile(filename, content, type) {
            const blob = new Blob([content], {type});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename; a.click();
            URL.revokeObjectURL(url);
        }
        
        function clearResults() {
            batchData = null;
            document.getElementById('resultsSection').classList.remove('active');
        }
    </script>
</body>
</html>
