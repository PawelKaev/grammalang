<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrammaLang — Пакетный анализ глав</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#1a1a2e;color:#eee;font-family:Segoe UI,Tahoma,sans-serif;min-height:100vh}
        .h{background:#16213e;padding:20px 30px;border-bottom:2px solid #0f3460;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
        .h h1{color:#e94560;font-size:20px}
        .h a{color:#888;text-decoration:none;font-size:14px}
        .h a:hover{color:#e94560}
        .c{max-width:1200px;margin:0 auto;padding:30px 20px}
        .card{background:#16213e;border:1px solid #0f3460;border-radius:12px;padding:25px;margin-bottom:20px}
        .card h2{color:#e94560;margin-bottom:15px;font-size:18px}
        .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
        .box{background:#1a1a2e;border:2px dashed #0f3460;border-radius:10px;padding:25px;text-align:center;cursor:pointer;transition:.3s}
        .box:hover{border-color:#e94560}
        .box .icon{font-size:36px}
        .box .title{color:#fff;font-weight:600;margin:8px 0;font-size:14px}
        .box .desc{color:#888;font-size:11px}
        input[type=file]{display:none}
        .bar{height:6px;background:#0f3460;border-radius:3px;overflow:hidden;margin:15px 0;display:none}
        .bar .fill{height:100%;background:linear-gradient(90deg,#e94560,#44CC44);border-radius:3px;width:0;transition:width .3s}
        .status{padding:12px;border-radius:6px;margin-top:15px;font-size:13px;display:none}
        .status.show{display:block}
        .info{background:#0f3460;color:#aaa}
        .ok{background:#1a3a1a;color:#44CC44}
        .err{background:#3a1a1a;color:#e94560}
        .res{display:none;margin-top:20px}
        .res.show{display:block}
        table{width:100%;border-collapse:collapse;background:#16213e;border-radius:8px;overflow:hidden;font-size:13px}
        th{background:#0f3460;padding:10px;text-align:left;color:#aaa;font-size:11px;text-transform:uppercase}
        td{padding:10px;border-bottom:1px solid #0f3460}
        tr:hover td{background:#1a2a4e}
        .badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
        .b-split{background:#44CC4430;color:#44CC44}
        .b-hold{background:#FF880030;color:#FF8800}
        .b-trans{background:#AA44FF30;color:#AA44FF}
        .b-gram{background:#00BBBB30;color:#00BBBB}
        .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px}
        .sum{background:#16213e;border:1px solid #0f3460;border-radius:8px;padding:15px;text-align:center}
        .sum .n{font-size:28px;font-weight:700;color:#e94560}
        .sum .l{font-size:10px;color:#888;text-transform:uppercase;margin-top:5px}
        .btn{display:inline-block;padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;margin:5px}
        .btn-ex{background:#44CC44;color:#1a1a2e}
        .btn-ex:hover{background:#3ab03a}
        .btn-cl{background:#0f3460;color:#fff}
        .btn-cl:hover{background:#1a4a7a}
    </style>
</head>
<body>
    <div class="h">
        <h1>📊 GrammaLang — Пакетный анализ глав</h1>
        <a href="interface.html">← На главную</a>
    </div>
    <div class="c">
        <div class="card">
            <h2>📂 Загрузите главы (работает без сервера, до 100)</h2>
            <div class="grid">
                <div class="box" onclick="document.getElementById('zip').click()">
                    <div class="icon">📦</div><div class="title">ZIP-архив</div>
                    <div class="desc">.zip с .txt файлами</div>
                    <input type="file" id="zip" accept=".zip" onchange="handleZip(this)">
                </div>
                <div class="box" onclick="document.getElementById('files').click()">
                    <div class="icon">📄</div><div class="title">Файлы .txt</div>
                    <div class="desc">До 100 файлов</div>
                    <input type="file" id="files" accept=".txt" multiple onchange="handleFiles(this)">
                </div>
                <div class="box" onclick="document.getElementById('dir').click()">
                    <div class="icon">📁</div><div class="title">Папка</div>
                    <div class="desc">С .txt файлами</div>
                    <input type="file" id="dir" webkitdirectory directory multiple onchange="handleFiles(this)">
                </div>
            </div>
            <div class="bar" id="bar"><div class="fill" id="fill"></div></div>
            <div class="status info show" id="status">Готов к работе. Выберите способ загрузки.</div>
        </div>
        <div class="res" id="results">
            <div class="summary" id="summary"></div>
            <div class="card"><h2>📋 Результаты по главам</h2><div style="overflow-x:auto;" id="table"></div></div>
            <button class="btn btn-ex" onclick="exportCSV()">📥 CSV</button>
            <button class="btn btn-ex" onclick="exportJSON()">📥 JSON</button>
            <button class="btn btn-cl" onclick="clearRes()">✕ Очистить</button>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        const CATS={'свобода':'Свобода','необходимость':'Необходимость','разум':'Разум','рассудок':'Рассудок','чувственность':'Чувственность','созерцание':'Созерцание','понятие':'Понятие','природа':'Природа','явление':'Явление','ноумен':'Ноумен','предмет':'Предмет','субстанция':'Субстанция','причина':'Причина','пространство':'Пространство','время':'Время','единство':'Единство','множество':'Множество','реальность':'Реальность','отрицание':'Отрицание','возможность':'Возможность','действительность':'Действительность','мораль':'Мораль','долг':'Долг','воля':'Воля','закон':'Закон','знание':'Знание','истина':'Истина','бытие':'Бытие','дух':'Дух','материя':'Материя','сознание':'Сознание','опыт':'Опыт'};
        const OPS={split:['с одной стороны','с другой стороны','во-первых','во-вторых','в-третьих'],hold:['антиномия','противоречие','диалектика','но','однако','хотя','тем не менее','вопреки'],transition:['следовательно','таким образом','далее','стало быть','перейдём','итак','отсюда'],grammar_change:['иначе говоря','другими словами','то есть','а именно','иными словами','в сущности','строго говоря']};
        const PAIRS=[['свобода','необходимость','антиномия'],['разум','чувственность','два источника'],['созерцание','понятие','начала'],['явление','ноумен','вещь в себе'],['пространство','время','формы'],['дух','материя'],['бытие','сознание']];

        let batchData=null;

        function msg(t,c){const e=document.getElementById('status');e.textContent=t;e.className='show '+(c||'info')}
        function prog(p){const b=document.getElementById('bar'),f=document.getElementById('fill');b.style.display='block';f.style.width=p+'%'}

        async function handleZip(inp){
            const f=inp.files[0];if(!f)return;
            msg('Распаковка ZIP...');prog(10);
            try{
                const zip=await JSZip.loadAsync(f);
                const texts=[];
                let total=Object.keys(zip.files).length,done=0;
                for(const[name,file]of Object.entries(zip.files)){
                    if(!file.dir&&name.endsWith('.txt')){
                        const content=await file.async('text');
                        texts.push({filename:name.split('/').pop(),content});
                    }
                    done++;prog(10+80*done/total);
                }
                if(!texts.length){msg('Нет .txt в архиве','err');return}
                analyze(texts);
            }catch(e){msg('Ошибка чтения ZIP: '+e.message,'err')}
        }

        async function handleFiles(inp){
            const fs=Array.from(inp.files).filter(f=>f.name.endsWith('.txt'));
            if(!fs.length){msg('Нет .txt файлов','err');return}
            if(fs.length>100){msg('Максимум 100 файлов','err');return}
            msg('Чтение '+fs.length+' файлов...');prog(5);
            const texts=[];
            for(let i=0;i<fs.length;i++){
                const content=await fs[i].text();
                texts.push({filename:fs[i].name,content});
                prog(5+90*(i+1)/fs.length);
            }
            analyze(texts);
        }

        function analyze(texts){
            msg('Анализ...');prog(90);
            const chapters=[];
            let t1=Date.now();
            
            for(const item of texts){
                const ch=analyzeText(item.filename,item.content);
                chapters.push(ch);
            }
            
            const t2=(Date.now()-t1)/1000;
            const success=chapters.filter(c=>!c.error).length;
            const errors=chapters.filter(c=>c.error).length;
            
            let ts=0,tt=0,tsplit=0,thold=0,ttrans=0,tgram=0;
            const subsTotal={};
            const tensTotal={};
            
            chapters.forEach(ch=>{
                if(ch.error)return;
                ts+=ch.substances.length;
                tt+=ch.tensions.length;
                tsplit+=ch.split;
                thold+=ch.hold;
                ttrans+=ch.transition;
                tgram+=ch.grammar;
                ch.substances.forEach(s=>{
                    if(!subsTotal[s.id])subsTotal[s.id]={name:s.name,count:0};
                    subsTotal[s.id].count+=s.count;
                });
                ch.tensions.forEach(t=>{
                    const k=t.pole_a+'↔'+t.pole_b;
                    if(!tensTotal[k])tensTotal[k]={...t,chapters:0};
                    tensTotal[k].chapters++;
                });
            });
            
            batchData={chapters,success,errors,totalTime:t2,ts,tt,tsplit,thold,ttrans,tgram,
                topSubstances:Object.values(subsTotal).sort((a,b)=>b.count-a.count).slice(0,10),
                topTensions:Object.values(tensTotal).sort((a,b)=>b.chapters-a.chapters).slice(0,10)};
            
            showResults();
        }

        function analyzeText(filename,text){
            const tl=text.toLowerCase();
            const substances=[];
            const found=new Set();
            for(const[w,n]of Object.entries(CATS)){
                let c=0,p=0;
                while((p=tl.indexOf(w,p))!==-1){c++;p+=w.length}
                if(c>0){substances.push({id:w,name:n,count:c,energy:Math.min(1,0.3+c*0.05)});found.add(w)}
            }
            
            const tensions=[];
            for(const[a,b,r]of PAIRS){
                if(found.has(a)&&found.has(b))tensions.push({pole_a:a,pole_b:b,reason:r||'оппозиция'});
            }
            
            let split=0,hold=0,transition=0,grammar=0;
            for(const[op,marks]of Object.entries(OPS)){
                for(const m of marks){
                    let c=0,p=0;
                    while((p=tl.indexOf(m,p))!==-1){c++;p+=m.length}
                    if(op==='split')split+=c;else if(op==='hold')hold+=c;
                    else if(op==='transition')transition+=c;else grammar+=c;
                }
            }
            
            const maxOp=Math.max(split,hold,transition,grammar);
            const totalOps=split+hold+transition+grammar||1;
            let style='Не определён';
            if(maxOp===split)style='Структурный';
            else if(maxOp===hold)style='Диалектический';
            else if(maxOp===transition)style='Переходный';
            else if(maxOp===grammar)style='Рефлексивный';
            
            return{filename,title:text.split('\n')[0]?.trim()?.substring(0,80)||filename,
                chars:text.length,words:text.split(/\s+/).length,
                substances:substances.sort((a,b)=>b.count-a.count).slice(0,15),
                tensions,split,hold,transition,grammar,
                dominantStyle:style,confidence:(maxOp/totalOps*100).toFixed(0),error:null};
        }

        function showResults(){
            const d=batchData;
            document.getElementById('summary').innerHTML=`
                <div class="sum"><div class="n">${d.success}/${d.chapters.length}</div><div class="l">Глав</div></div>
                <div class="sum"><div class="n">${d.ts}</div><div class="l">Субстанций</div></div>
                <div class="sum"><div class="n">${d.tt}</div><div class="l">Противоречий</div></div>
                <div class="sum"><div class="n">${d.totalTime.toFixed(1)}с</div><div class="l">Время</div></div>
                <div class="sum"><div class="n">${d.tsplit}</div><div class="l">Split</div></div>
                <div class="sum"><div class="n">${d.thold}</div><div class="l">Hold</div></div>
                <div class="sum"><div class="n">${d.ttrans}</div><div class="l">Transition</div></div>
                <div class="sum"><div class="n">${d.tgram}</div><div class="l">Grammar Ch</div></div>`;
            
            const badge=s=>{
                if(s.includes('Структурный'))return'<span class="badge b-split">'+s+'</span>';
                if(s.includes('Диалектический'))return'<span class="badge b-hold">'+s+'</span>';
                if(s.includes('Переходный'))return'<span class="badge b-trans">'+s+'</span>';
                return'<span class="badge b-gram">'+s+'</span>';
            };
            
            document.getElementById('table').innerHTML=`<table><thead><tr>
                <th>Файл</th><th>Слов</th><th>Субст</th><th>Split</th><th>Hold</th><th>Trans</th><th>GramCh</th><th>Стиль</th></tr></thead><tbody>`
                +d.chapters.map(c=>`<tr>
                    <td title="${c.title}">${c.filename}</td><td>${c.words}</td><td>${c.substances.length}</td>
                    <td>${c.split}</td><td>${c.hold}</td><td>${c.transition}</td><td>${c.grammar}</td>
                    <td>${badge(c.dominantStyle)}</td></tr>`).join('')+'</tbody></table>';
            
            document.getElementById('results').classList.add('show');
            document.getElementById('bar').style.display='none';
            msg('✅ Анализ завершён! '+d.success+' глав проанализировано за '+d.totalTime.toFixed(1)+' сек','ok');
        }

        function exportCSV(){
            if(!batchData)return;
            let csv='Файл,Слов,Субстанций,Split,Hold,Transition,GrammarCh,Стиль\n';
            batchData.chapters.forEach(c=>csv+=`"${c.filename}",${c.words},${c.substances.length},${c.split},${c.hold},${c.transition},${c.grammar},"${c.dominantStyle}"\n`);
            download('batch_analysis.csv',csv,'text/csv');
        }
        function exportJSON(){
            if(!batchData)return;
            download('batch_analysis.json',JSON.stringify(batchData,null,2),'application/json');
        }
        function download(name,content,type){
            const b=new Blob([content],{type}),a=document.createElement('a');
            a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href);
        }
        function clearRes(){
            batchData=null;document.getElementById('results').classList.remove('show');
            document.getElementById('bar').style.display='none';
            msg('Готов к работе. Выберите способ загрузки.','info');
        }
        msg('✅ Автономный режим. Сервер не нужен.','ok');
    </script>
</body>
</html>
