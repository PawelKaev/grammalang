<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrammaLang — Анализатор философского текста v2.0</title>
    <!-- ВЕСЬ ВАШ CSS БЕЗ ИЗМЕНЕНИЙ -->
    <style>
        /* ... весь ваш CSS ... */
    </style>
</head>
<body>
    <!-- ВЕСЬ ВАШ HTML БЕЗ ИЗМЕНЕНИЙ -->
    
    <script>
        // ==================== СОСТОЯНИЕ ====================
        let data = null;
        let originalText = '';
        let activeFilters = {
            substance: true,
            modus: true,
            split: true,
            hold: true,
            transition: true,
            grammar_change: true,
        };
        
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        const loading = document.getElementById('loading');
        const tooltip = document.getElementById('tooltip');
        loading.style.display = 'none';
        
        // ==================== РАЗМЕРЫ ====================
        function resize() {
            const container = canvas.parentElement;
            if (!container) return;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            if (data) drawGraph();
        }
        window.addEventListener('resize', resize);
        resize();
        
        // ==================== ЗАГРУЗКА ФАЙЛА ====================
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const info = document.getElementById('fileInfo');
            info.textContent = `📄 ${file.name} (${(file.size / 1024).toFixed(1)} КБ)`;
            info.classList.add('show');
            
            const reader = new FileReader();
            reader.onload = function(ev) {
                document.getElementById('textInput').value = ev.target.result;
                // Авто-анализ после загрузки файла
                setTimeout(() => analyze(), 300);
            };
            reader.readAsText(file);
        });
        
        // ==================== ПРИМЕРЫ ====================
        function loadExample(type) {
            if (type === 'kant') {
                document.getElementById('textInput').value = 
                    'Разум видит только то, что сам создаёт по собственному плану. ' +
                    'Он должен идти впереди с принципами своих суждений по постоянным законам ' +
                    'и заставлять природу отвечать на его вопросы, а не тащиться у неё на поводу. ' +
                    'Но случайные наблюдения, производимые без предварительного плана, ' +
                    'не связаны необходимым законом, тогда как разум ищет и нуждается в таком законе.';
            } else if (type === 'kant_full') {
                document.getElementById('textInput').value = 
                    'ТРАНСЦЕНДЕНТАЛЬНОГО УЧЕНИЯ О НАЧАЛАХ\n' +
                    'ЧАСТЬ ВТОРАЯ. ТРАНСЦЕНДЕНТАЛЬНАЯ ЛОГИКА\n\n' +
                    'ВВЕДЕНИЕ. Идея трансцендентальной логики\n\n' +
                    'I. О логике вообще\n\n' +
                    'Наше знание возникает из двух основных источников души: первый есть способность ' +
                    'получать представления (восприимчивость к впечатлениям), а второй — способность ' +
                    'познавать через эти представления предмет (спонтанность понятий). ' +
                    'Посредством первого предмет нам даётся, а посредством второго он мыслится ' +
                    'в отношении к представлению. Созерцания и понятия суть, следовательно, ' +
                    'начала всякого нашего познания, так что ни понятия без соответствующего ' +
                    'им некоторым образом созерцания, ни созерцание без понятий не могут дать знание.\n\n' +
                    'И те и другие или чистые, или эмпирические. Эмпирическими они называются тогда, ' +
                    'когда в них содержится ощущение (которое предполагает действительное присутствие ' +
                    'предмета). Чистыми же — тогда, когда к представлению не примешивается ощущение. ' +
                    'Поэтому чистое созерцание содержит только форму, при которой нечто созерцается, ' +
                    'а чистое понятие — только форму мышления о предмете вообще. ' +
                    'Только чистые созерцания или чистые понятия возможны a priori, ' +
                    'эмпирические же — только a posteriori.\n\n' +
                    'Способность же получать представления мы называем чувственностью, так что объекты ' +
                    'даются нам через чувственность, и только она даёт нам созерцания; ' +
                    'рассудком же объекты мыслятся, и из него возникают понятия. ' +
                    'Но всякое мышление должно в конце концов прямо или косвенно ' +
                    'иметь отношение к созерцаниям, стало быть, у нас — к чувственности, ' +
                    'так как ни один предмет не может быть нам дан иным способом.';
            }
            // Авто-анализ после загрузки примера
            setTimeout(() => analyze(), 200);
        }
        
        // ==================== ФИЛЬТРЫ ====================
        function toggleFilter(type, btn) {
            activeFilters[type] = !activeFilters[type];
            btn.classList.toggle('active', activeFilters[type]);
            
            if (data) {
                renderTextAnalysis();
                drawGraph();
                renderOperatorMap();
            }
        }
        
        // ==================== ОЧИСТКА ====================
        function clearAll() {
            document.getElementById('textInput').value = '';
            document.getElementById('fileInfo').classList.remove('show');
            document.getElementById('fileInput').value = '';
            document.getElementById('styleIndicator').classList.remove('show');
            data = null;
            originalText = '';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('substanceList').innerHTML = '';
            document.getElementById('tensionList').innerHTML = '';
            document.getElementById('textAnalysis').innerHTML = '';
            document.getElementById('operatorMap').innerHTML = '';
            resetStats();
        }
        
        function resetStats() {
            ['statSubstances','statModus','statSplit','statHold','statTransition','statGrammar'].forEach(id => {
                document.getElementById(id).textContent = '0';
            });
        }
        
        function updateStats(result) {
            resetStats();
            if (!result) return;
            
            const s = result.stats || {};
            document.getElementById('statSubstances').textContent = s.total_substances || 0;
            
            let modusCount = 0;
            if (result.substances) {
                result.substances.forEach(sub => {
                    if (sub.modi) modusCount += sub.modi.length;
                });
            }
            document.getElementById('statModus').textContent = modusCount;
            
            const ops = result.operator_stats || {};
            document.getElementById('statSplit').textContent = ops.split || 0;
            document.getElementById('statHold').textContent = ops.hold || 0;
            document.getElementById('statTransition').textContent = ops.transition || 0;
            document.getElementById('statGrammar').textContent = ops.grammar_change || 0;
            
            const opEntries = [
                {name: 'split', count: ops.split || 0, style: 'Структурный / аналитический', icon: '✂️'},
                {name: 'hold', count: ops.hold || 0, style: 'Диалектический / проблематизирующий', icon: '⚡'},
                {name: 'transition', count: ops.transition || 0, style: 'Переходный / синтезирующий', icon: '🔄'},
                {name: 'grammar_change', count: ops.grammar_change || 0, style: 'Рефлексивный / мета-уровневый', icon: '🔀'},
            ];
            opEntries.sort((a, b) => b.count - a.count);
            
            if (opEntries[0].count > 0) {
                const indicator = document.getElementById('styleIndicator');
                indicator.classList.add('show');
                document.getElementById('styleName').textContent = 
                    `${opEntries[0].icon} ${opEntries[0].style}`;
            }
        }
        
        // ==================== АНАЛИЗ (ИСПРАВЛЕННАЯ ВЕРСИЯ) ====================
        async function analyze() {
            const text = document.getElementById('textInput').value.trim();
            if (!text) return;

            originalText = text;
            const btn = document.getElementById('btnAnalyze');
            btn.disabled = true;
            btn.textContent = '⏳ Анализ...';
            loading.style.display = 'block';
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Пробуем сервер, но если не отвечает за 2 секунды — эмулируем
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 2000);
            
            try {
                const response = await fetch('http://localhost:8080/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text }),
                    signal: controller.signal,
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const serverData = await response.json();
                
                // Обогащаем данные операторами
                if (!serverData.operator_stats) {
                    serverData.operator_matches = findOperatorMarkers(text);
                    serverData.operator_stats = countOperatorStats(serverData.operator_matches);
                }
                if (!serverData.operator_matches) {
                    serverData.operator_matches = findOperatorMarkers(text);
                }
                
                data = serverData;
                
            } catch (e) {
                clearTimeout(timeoutId);
                console.log('Сервер недоступен, использую автономный анализ');
                // Автономный анализ
                data = performLocalAnalysis(text);
            } finally {
                btn.disabled = false;
                btn.textContent = '▶ Анализ';
                loading.style.display = 'none';
                
                if (data) {
                    updateStats(data);
                    drawGraph();
                    renderOperatorMap();
                    renderSubstances();
                    renderTensions();
                    renderTextAnalysis();
                }
            }
        }
        
        // ==================== АВТОНОМНЫЙ АНАЛИЗ (без сервера) ====================
        function performLocalAnalysis(text) {
            const substances = [];
            const substanceIds = new Set();
            
            // Расширенный словарь философских категорий
            const categories = [
                {word: 'разум', name: 'Разум', energy: 0.90},
                {word: 'рассудок', name: 'Рассудок', energy: 0.85},
                {word: 'чувственность', name: 'Чувственность', energy: 0.70},
                {word: 'созерцание', name: 'Созерцание', energy: 0.75},
                {word: 'понятие', name: 'Понятие', energy: 0.70},
                {word: 'природа', name: 'Природа', energy: 0.60},
                {word: 'свобода', name: 'Свобода', energy: 0.85},
                {word: 'необходимость', name: 'Необходимость', energy: 0.50},
                {word: 'явление', name: 'Явление', energy: 0.60},
                {word: 'феномен', name: 'Феномен', energy: 0.55},
                {word: 'ноумен', name: 'Ноумен', energy: 0.65},
                {word: 'предмет', name: 'Предмет', energy: 0.55},
                {word: 'субстанция', name: 'Субстанция', energy: 0.70},
                {word: 'причина', name: 'Причина', energy: 0.65},
                {word: 'следствие', name: 'Следствие', energy: 0.50},
                {word: 'пространство', name: 'Пространство', energy: 0.60},
                {word: 'время', name: 'Время', energy: 0.65},
                {word: 'единство', name: 'Единство', energy: 0.55},
                {word: 'множество', name: 'Множество', energy: 0.50},
                {word: 'реальность', name: 'Реальность', energy: 0.70},
                {word: 'отрицание', name: 'Отрицание', energy: 0.55},
                {word: 'возможность', name: 'Возможность', energy: 0.60},
                {word: 'действительность', name: 'Действительность', energy: 0.65},
                {word: 'мораль', name: 'Мораль', energy: 0.55},
                {word: 'долг', name: 'Долг', energy: 0.60},
                {word: 'воля', name: 'Воля', energy: 0.70},
                {word: 'закон', name: 'Закон', energy: 0.65},
            ];
            
            const textLower = text.toLowerCase();
            
            categories.forEach(cat => {
                if (textLower.includes(cat.word)) {
                    // Энергия зависит от частоты встречаемости
                    const count = (textLower.match(new RegExp(cat.word, 'g')) || []).length;
                    const adjustedEnergy = Math.min(1.0, cat.energy + (count - 1) * 0.05);
                    
                    substances.push({
                        id: cat.word,
                        name: cat.name,
                        energy: adjustedEnergy,
                        modi: [],
                    });
                    substanceIds.add(cat.word);
                }
            });
            
            // Модусы (философские глаголы)
            const modusPatterns = [
                {verb: 'мыслит', subject: 'разум'},
                {verb: 'мыслиться', subject: 'понятие'},
                {verb: 'мышление', subject: 'разум'},
                {verb: 'даётся', subject: 'предмет'},
                {verb: 'даны', subject: 'предмет'},
                {verb: 'называем', subject: 'чувственность'},
                {verb: 'называются', subject: 'созерцание'},
                {verb: 'возникают', subject: 'понятие'},
                {verb: 'возникает', subject: 'знание'},
                {verb: 'создаёт', subject: 'разум'},
                {verb: 'содержит', subject: 'созерцание'},
                {verb: 'содержится', subject: 'ощущение'},
                {verb: 'познавать', subject: 'рассудок'},
                {verb: 'получать', subject: 'чувственность'},
                {verb: 'предполагает', subject: 'ощущение'},
                {verb: 'созерцается', subject: 'предмет'},
            ];
            
            modusPatterns.forEach(mp => {
                if (textLower.includes(mp.verb) && substanceIds.has(mp.subject)) {
                    const sub = substances.find(s => s.id === mp.subject);
                    if (sub) {
                        const exists = sub.modi.some(m => m.value === mp.verb);
                        if (!exists) sub.modi.push({name: mp.verb, value: mp.verb});
                    }
                }
            });
            
            // Противоречия (антиномии и оппозиции)
            const tensions = [];
            const tensionPairs = [
                {a: 'разум', b: 'чувственность', reason: 'два источника познания'},
                {a: 'созерцание', b: 'понятие', reason: 'начала познания'},
                {a: 'свобода', b: 'необходимость', reason: 'антиномия'},
                {a: 'явление', b: 'ноумен', reason: 'вещь сама по себе'},
                {a: 'пространство', b: 'время', reason: 'формы созерцания'},
                {a: 'единство', b: 'множество', reason: 'категории количества'},
                {a: 'возможность', b: 'действительность', reason: 'категории модальности'},
                {a: 'реальность', b: 'отрицание', reason: 'категории качества'},
                {a: 'субстанция', b: 'причина', reason: 'категории отношения'},
                {a: 'природа', b: 'свобода', reason: 'детерминизм vs спонтанность'},
            ];
            
            tensionPairs.forEach(pair => {
                if (substanceIds.has(pair.a) && substanceIds.has(pair.b)) {
                    tensions.push({
                        id: `t_${tensions.length}`,
                        pole_a: pair.a,
                        pole_b: pair.b,
                        reason: pair.reason,
                        status: 'held',
                    });
                }
            });
            
            // Маркеры операторов
            const operator_matches = findOperatorMarkers(text);
            const operator_stats = countOperatorStats(operator_matches);
            
            return {
                substances,
                tensions,
                operator_matches,
                operator_stats,
                stats: {
                    total_substances: substances.length,
                    total_tensions: tensions.length,
                    held_tensions: tensions.filter(t => t.status === 'held').length,
                    resolved_tensions: tensions.filter(t => t.status === 'resolved').length,
                },
            };
        }
        
        // ==================== ПОИСК ОПЕРАТОРОВ ====================
        function findOperatorMarkers(text) {
            const markers = {
                split: [
                    'с одной стороны', 'с другой стороны', 'во-первых', 'во-вторых', 'в-третьих',
                    'прежде всего', 'затем', 'наконец', 'разделим', 'различать', 'различие между',
                    'двояким образом', 'трояким образом', 'можно рассматривать',
                ],
                hold: [
                    'антиномия', 'противоречие', 'противоположность', 'диалектика', 'парадокс',
                    'конфликт', 'столкновение', 'несовместимость', 'взаимоисключающий',
                    'но', 'однако', 'тем не менее', 'хотя', 'несмотря на', 'вопреки',
                    'в то же время', 'между тем', 'не может быть', 'невозможно',
                ],
                transition: [
                    'перейдём', 'перейти', 'переход', 'обратимся', 'рассмотрим теперь',
                    'до сих пор', 'теперь же', 'выше было показано', 'далее', 'продолжим',
                    'следовательно', 'таким образом', 'в свою очередь', 'напротив', 'наоборот',
                    'стало быть',
                ],
                grammar_change: [
                    'иначе говоря', 'другими словами', 'в ином смысле', 'в другом значении',
                    'переосмысление', 'с иной точки зрения', 'можно сказать иначе',
                    'то есть', 'а именно', 'иными словами', 'в сущности', 'по сути',
                    'строго говоря', 'собственно', 'в строгом смысле', 'в широком смысле',
                ],
            };
            
            const matches = [];
            const textLower = text.toLowerCase();
            
            for (const [opType, markerList] of Object.entries(markers)) {
                for (const marker of markerList) {
                    let searchPos = 0;
                    while (true) {
                        const idx = textLower.indexOf(marker, searchPos);
                        if (idx === -1) break;
                        
                        const start = Math.max(0, textLower.lastIndexOf('.', idx) + 1);
                        const end = textLower.indexOf('.', idx + marker.length);
                        const context = text.substring(
                            start, 
                            end === -1 ? Math.min(text.length, start + 150) : end + 1
                        ).trim();
                        
                        matches.push({
                            operator: opType,
                            marker: marker,
                            position: idx,
                            context: context.substring(0, 120),
                            confidence: marker.length > 5 ? 0.9 : 0.6,
                        });
                        
                        searchPos = idx + marker.length;
                    }
                }
            }
            
            // Убираем дубликаты
            matches.sort((a, b) => b.marker.length - a.marker.length);
            const unique = [];
            const usedPositions = new Set();
            
            for (const m of matches) {
                const key = `${m.position}-${m.operator}`;
                if (!usedPositions.has(key)) {
                    usedPositions.add(key);
                    unique.push(m);
                }
            }
            
            return unique;
        }
        
        function countOperatorStats(matches) {
            const stats = { split: 0, hold: 0, transition: 0, grammar_change: 0 };
            const seen = new Set();
            
            matches.forEach(m => {
                const key = `${m.operator}-${m.marker}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    stats[m.operator] = (stats[m.operator] || 0) + 1;
                }
            });
            
            return stats;
        }
        
        // ==================== ГРАФ ====================
        function drawGraph() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!data || !data.substances || !data.substances.length) return;

            const subs = data.substances;
            const tens = data.tensions || [];
            const positions = {};
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const r = Math.min(cx, cy) * 0.38;
            const n = subs.length;

            subs.forEach((s, i) => {
                const angle = (2 * Math.PI * i) / n - Math.PI / 2;
                positions[s.id] = { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
            });

            tens.forEach(t => {
                const a = positions[t.pole_a];
                const b = positions[t.pole_b];
                if (!a || !b) return;
                
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                
                if (t.status === 'held') {
                    ctx.strokeStyle = '#e94560';
                    ctx.setLineDash([8, 4]);
                    ctx.lineWidth = 3;
                } else {
                    ctx.strokeStyle = '#2ecc71';
                    ctx.setLineDash([]);
                    ctx.lineWidth = 2;
                }
                ctx.stroke();
                ctx.setLineDash([]);
                
                const mx = (a.x + b.x) / 2;
                const my = (a.y + b.y) / 2 - 12;
                ctx.fillStyle = '#888';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(t.reason || '', mx, my);
            });

            subs.forEach(s => {
                const p = positions[s.id];
                if (!p) return;
                
                const radius = 18 + s.energy * 35;
                const grad = ctx.createRadialGradient(p.x, p.y, radius * 0.3, p.x, p.y, radius);
                grad.addColorStop(0, '#ff6b6b');
                grad.addColorStop(0.5, s.energy > 0.5 ? '#e94560' : '#3498db');
                grad.addColorStop(1, s.energy > 0.5 ? '#c23152' : '#2980b9');
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 13px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(s.name, p.x, p.y + 4);
                
                ctx.font = '10px sans-serif';
                ctx.fillStyle = '#ccc';
                ctx.fillText(s.energy.toFixed(2), p.x, p.y + radius + 14);
            });
        }
        
        // ==================== КАРТА ОПЕРАТОРОВ ====================
        function renderOperatorMap() {
            const container = document.getElementById('operatorMap');
            if (!data || !data.operator_matches || !data.operator_matches.length) {
                container.innerHTML = '<div style="color:#888;text-align:center;padding:40px;">Операторы не обнаружены. Попробуйте загрузить более объёмный текст.</div>';
                return;
            }
            
            const filtered = data.operator_matches.filter(m => activeFilters[m.operator] !== false);
            
            if (!filtered.length) {
                container.innerHTML = '<div style="color:#888;text-align:center;padding:40px;">Все операторы скрыты фильтрами.</div>';
                return;
            }
            
            const icons = {
                split: '✂️',
                hold: '⚡',
                transition: '🔄',
                grammar_change: '🔀',
            };
            
            const names = {
                split: 'Split (разделение)',
                hold: 'Hold (удержание)',
                transition: 'Transition (переход)',
                grammar_change: 'Grammar Change (смена грамматики)',
            };
            
            container.innerHTML = filtered.map(m => `
                <div class="operator-card">
                    <div class="op-icon ${m.operator}">${icons[m.operator] || '•'}</div>
                    <div class="op-info">
                        <div class="op-marker">${names[m.operator] || m.operator}</div>
                        <div style="color:#fff;">Маркер: «${m.marker}»</div>
                        <div class="op-context">…${m.context}…</div>
                        <div class="op-confidence">Уверенность: ${(m.confidence * 100).toFixed(0)}%</div>
                    </div>
                </div>
            `).join('');
        }
        
        // ==================== СУБСТАНЦИИ ====================
        function renderSubstances() {
            const container = document.getElementById('substanceList');
            if (!data || !data.substances || !data.substances.length) {
                container.innerHTML = '<div style="color:#888;text-align:center;padding:40px;">Нет данных</div>';
                return;
            }
            
            container.innerHTML = data.substances.map(s => `
                <div class="substance-card">
                    <h3>${s.name}</h3>
                    <div style="font-size:12px;color:#888;">ID: ${s.id} | Энергия: ${s.energy.toFixed(2)}</div>
                    <div class="energy-bar"><div class="energy-fill" style="width:${s.energy*100}%"></div></div>
                    ${s.modi && s.modi.length ? `<div class="modi">Модусы: ${s.modi.map(m => `<span>${m.value}</span>`).join(', ')}</div>` : ''}
                </div>
            `).join('');
        }
        
        // ==================== ПРОТИВОРЕЧИЯ ====================
        function renderTensions() {
            const container = document.getElementById('tensionList');
            if (!data || !data.tensions || !data.tensions.length) {
                container.innerHTML = '<div style="color:#888;text-align:center;padding:40px;">Противоречия не обнаружены</div>';
                return;
            }
            
            container.innerHTML = data.tensions.map(t => `
                <div class="tension-card">
                    <div class="status ${t.status}"></div>
                    <div class="info">
                        <strong>${t.pole_a}</strong> ↔ <strong>${t.pole_b}</strong>
                        <div class="reason">${t.reason || ''} · ${t.status === 'held' ? 'Удерживается' : 'Разрешено'}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // ==================== ТЕКСТ С РАЗМЕТКОЙ ====================
        function renderTextAnalysis() {
            const container = document.getElementById('textAnalysis');
            if (!originalText || !data) {
                container.innerHTML = '<div style="color:#888;">Нет данных для отображения</div>';
                return;
            }

            let html = escapeHTML(originalText);
            const spans = [];
            
            if (activeFilters.substance && data.substances) {
                data.substances.forEach(s => {
                    const regex = new RegExp(`(${escapeRegex(s.name)})`, 'gi');
                    let match;
                    while ((match = regex.exec(originalText)) !== null) {
                        spans.push({
                            start: match.index,
                            end: match.index + match[0].length,
                            text: match[0],
                            type: 'substance',
                            title: `Субстанция: ${s.name} (энергия: ${s.energy.toFixed(2)})`,
                            className: 'hl-substance',
                        });
                    }
                });
            }
            
            if (activeFilters.modus && data.substances) {
                const allModi = [];
                data.substances.forEach(s => {
                    if (s.modi) s.modi.forEach(m => allModi.push(m.value));
                });
                allModi.forEach(m => {
                    const regex = new RegExp(`(${escapeRegex(m)})`, 'gi');
                    let match;
                    while ((match = regex.exec(originalText)) !== null) {
                        spans.push({
                            start: match.index,
                            end: match.index + match[0].length,
                            text: match[0],
                            type: 'modus',
                            title: 'Модус',
                            className: 'hl-modus',
                        });
                    }
                });
            }
            
            if (data.operator_matches) {
                data.operator_matches.forEach(m => {
                    if (activeFilters[m.operator] !== false) {
                        spans.push({
                            start: m.position,
                            end: m.position + m.marker.length,
                            text: m.marker,
                            type: m.operator,
                            title: `Оператор: ${m.operator} (${(m.confidence * 100).toFixed(0)}%)`,
                            className: `hl-${m.operator}`,
                        });
                    }
                });
            }
            
            spans.sort((a, b) => a.start - b.start || b.end - a.end);
            const filteredSpans = [];
            let lastEnd = 0;
            for (const span of spans) {
                if (span.start >= lastEnd) {
                    filteredSpans.push(span);
                    lastEnd = span.end;
                }
            }
            
            filteredSpans.sort((a, b) => b.start - a.start);
            for (const span of filteredSpans) {
                const before = html.substring(0, span.start);
                const text = html.substring(span.start, span.end);
                const after = html.substring(span.end);
                html = before + 
                    `<span class="${span.className}" title="${span.title}">${text}</span>` + 
                    after;
            }

            let legendHTML = '<div class="legend">';
            if (activeFilters.substance) legendHTML += '<span><span class="swatch" style="background:#e9456030;border-bottom:2px solid #e94560"></span> Субстанции</span>';
            if (activeFilters.modus) legendHTML += '<span><span class="swatch" style="background:#3498db30;border-bottom:2px dotted #3498db"></span> Модусы</span>';
            if (activeFilters.hold) legendHTML += '<span><span class="swatch" style="background:#FF880030;border-bottom:2px dashed #f39c12"></span> Hold</span>';
            if (activeFilters.split) legendHTML += '<span><span class="swatch" style="background:#44CC4430;border-bottom:2px solid #44CC44"></span> Split</span>';
            if (activeFilters.transition) legendHTML += '<span><span class="swatch" style="background:#AA44FF30;border-bottom:2px dotted #AA44FF"></span> Transition</span>';
            if (activeFilters.grammar_change) legendHTML += '<span><span class="swatch" style="background:#00BBBB30;border-bottom:2px dashed #00BBBB"></span> Grammar Ch.</span>';
            legendHTML += '</div>';
            
            container.innerHTML = legendHTML + html;
            
            container.querySelectorAll('[title]').forEach(el => {
                el.addEventListener('mouseenter', (e) => {
                    tooltip.textContent = el.getAttribute('title');
                    tooltip.style.display = 'block';
                    tooltip.style.left = (e.pageX + 10) + 'px';
                    tooltip.style.top = (e.pageY - 30) + 'px';
                });
                el.addEventListener('mouseleave', () => {
                    tooltip.style.display = 'none';
                });
            });
        }
        
        // ==================== ВКЛАДКИ ====================
        function switchTab(name) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            
            const tabMap = { graph: 0, operators: 1, substances: 2, tensions: 3, text: 4 };
            const idx = tabMap[name] !== undefined ? tabMap[name] : 0;
            
            const tabs = document.querySelectorAll('.tab');
            if (tabs[idx]) tabs[idx].classList.add('active');
            
            const pane = document.getElementById(`tab-${name}`);
            if (pane) pane.classList.add('active');
            
            if (name === 'graph') { resize(); drawGraph(); }
        }
        
        // ==================== УТИЛИТЫ ====================
        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }
        
        // ==================== ИНИЦИАЛИЗАЦИЯ С АВТО-АНАЛИЗОМ ====================
        window.addEventListener('DOMContentLoaded', () => {
            loadExample('kant');
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.add('active');
            });
            // Автоматический анализ через 500 мс после загрузки
            setTimeout(() => {
                const text = document.getElementById('textInput').value.trim();
                if (text) analyze();
            }, 500);
        });
    </script>
</body>
</html>
