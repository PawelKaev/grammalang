<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GrammaLang Visualizer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: monospace; }
        .node circle { stroke: #fff; stroke-width: 2px; }
        .node text { fill: #eee; font-size: 12px; text-anchor: middle; }
        .link { stroke: #888; stroke-width: 2px; }
        .link.held { stroke: #e74c3c; stroke-dasharray: 5,5; }
        .link.resolved { stroke: #2ecc71; }
        #info { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #eee; padding: 10px; border-radius: 5px; max-width: 300px; }
        #controls { position: absolute; top: 10px; left: 10px; z-index: 10; }
        button { background: #16213e; color: #eee; border: 1px solid #0f3460; padding: 8px 16px; margin: 2px; cursor: pointer; border-radius: 3px; }
        button:hover { background: #0f3460; }
        input { padding: 8px; width: 300px; border-radius: 3px; border: 1px solid #0f3460; background: #16213e; color: #eee; }
    </style>
</head>
<body>
    <div id="controls">
        <input id="textInput" value="Свобода и необходимость" />
        <button onclick="analyze()">Analyze</button>
    </div>
    <div id="info"></div>
    <canvas id="canvas" style="position:absolute; top:0; left:0; width:100%; height:100%;"></canvas>
    <script>
        // Простой рисовальщик без D3 — чистый Canvas
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        let data = null;

        function drawGraph() {
            if (!data) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const substances = data.substances;
            const tensions = data.tensions;
            const positions = {};

            // Расставляем узлы по кругу
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = Math.min(cx, cy) * 0.4;
            const n = substances.length;

            substances.forEach((s, i) => {
                const angle = (2 * Math.PI * i) / n - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                positions[s.id] = { x, y };
            });

            // Рисуем связи
            tensions.forEach(t => {
                const a = positions[t.pole_a];
                const b = positions[t.pole_b];
                if (!a || !b) return;

                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                if (t.status === "held") {
                    ctx.strokeStyle = "#e74c3c";
                    ctx.setLineDash([8, 4]);
                    ctx.lineWidth = 3;
                } else {
                    ctx.strokeStyle = "#2ecc71";
                    ctx.setLineDash([]);
                    ctx.lineWidth = 2;
                }
                ctx.stroke();
                ctx.setLineDash([]);

                // Подпись причины
                const mx = (a.x + b.x) / 2;
                const my = (a.y + b.y) / 2 - 10;
                ctx.fillStyle = "#aaa";
                ctx.font = "11px monospace";
                ctx.textAlign = "center";
                ctx.fillText(t.reason, mx, my);
            });

            // Рисуем узлы
            substances.forEach(s => {
                const pos = positions[s.id];
                if (!pos) return;

                const r = 20 + s.energy * 30;

                // Градиент
                const grad = ctx.createRadialGradient(pos.x, pos.y, r * 0.3, pos.x, pos.y, r);
                grad.addColorStop(0, "#ffcc00");
                grad.addColorStop(1, s.energy > 0.5 ? "#e74c3c" : "#3498db");

                ctx.beginPath();
                ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                ctx.stroke();

                // Имя
                ctx.fillStyle = "#fff";
                ctx.font = "13px monospace";
                ctx.textAlign = "center";
                ctx.fillText(s.name, pos.x, pos.y + 4);

                // Энергия под именем
                ctx.fillStyle = "#ccc";
                ctx.font = "10px monospace";
                ctx.fillText(s.energy.toFixed(2), pos.x, pos.y + r + 15);
            });
        }

        async function analyze() {
            const text = document.getElementById("textInput").value;
            try {
                const response = await fetch("http://localhost:8080/analyze", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: text })
                });
                data = await response.json();
            } catch (e) {
                // Демо-данные
                data = {
                    substances: [
                        { id: "свобода", name: "Свобода", energy: 0.8 },
                        { id: "необходимость", name: "Необходимость", energy: 0.4 }
                    ],
                    tensions: [
                        { pole_a: "свобода", pole_b: "необходимость", status: "held", reason: "антиномия" }
                    ]
                };
            }
            drawGraph();
            document.getElementById("info").innerHTML = `
                Substances: ${data.substances.length}<br/>
                Tensions: ${data.tensions.length}
            `;
        }

        // Рисуем при загрузке
        analyze();
    </script>
</body>
</html>
